name: Promote Canary

on:
  push:
    branches:
      - canary
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update promotion PR (canary -> main)
        id: promote_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const title = "chore: promote canary to main";
            const body = [
              "Automated promotion PR from `canary` to `main`.",
              "",
              "This PR is updated whenever new commits land on `canary`.",
            ].join("\n");

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:canary`,
              base: "main",
              per_page: 1,
            });

            let pr;
            if (existing.data.length === 0) {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title,
                body,
                head: "canary",
                base: "main",
                maintainer_can_modify: true,
              });
              pr = created.data;
              core.info(`Created promotion PR #${pr.number}`);
            } else {
              pr = existing.data[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body,
              });
              core.info(`Updated promotion PR #${pr.number}`);
            }

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ["promotion"],
              });
            } catch (error) {
              core.warning(`Could not set promotion label: ${error.message}`);
            }

            core.setOutput("pr_number", String(pr.number));

      - name: Enable auto-merge on promotion PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.promote_pr.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            let pr;
            if (process.env.PR_NUMBER) {
              const got = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: Number(process.env.PR_NUMBER),
              });
              pr = got.data;
            } else {
              const prs = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:canary`,
                base: "main",
                per_page: 1,
              });
              if (prs.data.length === 0) {
                core.info("No open canary->main promotion PR found.");
                return;
              }
              pr = prs.data[0];
            }

            core.info(`Found promotion PR #${pr.number}`);

            try {
              await github.graphql(
                `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: { pullRequestId: $pullRequestId, mergeMethod: MERGE }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                { pullRequestId: pr.node_id }
              );
              core.info(`Auto-merge enabled for PR #${pr.number}`);
            } catch (error) {
              core.warning(
                `Could not enable auto-merge for PR #${pr.number}: ${error.message}`
              );
            }
