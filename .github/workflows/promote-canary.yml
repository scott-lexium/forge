name: Promote Canary

on:
  push:
    branches:
      - canary
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update promotion PR (canary -> main)
        id: promote_pr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: canary
          destination_branch: main
          pr_title: "chore: promote canary to main"
          pr_body: |
            Automated promotion PR from `canary` to `main`.

            This PR is updated whenever new commits land on `canary`.
          pr_label: "promotion"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on promotion PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const headRef = `${owner}:canary`;

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: headRef,
              base: "main",
              per_page: 1,
            });

            if (prs.data.length === 0) {
              core.info("No open canary->main promotion PR found.");
              return;
            }

            const pr = prs.data[0];
            core.info(`Found promotion PR #${pr.number}`);

            try {
              await github.graphql(
                `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: { pullRequestId: $pullRequestId, mergeMethod: MERGE }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                { pullRequestId: pr.node_id }
              );
              core.info(`Auto-merge enabled for PR #${pr.number}`);
            } catch (error) {
              core.warning(
                `Could not enable auto-merge for PR #${pr.number}: ${error.message}`
              );
            }
